name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck and unit tests
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Web smoke tests
        run: xvfb-run -a npm run test:e2e

      - name: Bundle performance budget
        run: npm run perf:budget

      - name: Electron smoke tests
        run: xvfb-run -a npm run test:electron
