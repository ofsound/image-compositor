<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' blob: data:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https: http: ws: wss:; worker-src 'self' blob:"
    />
    <title>Compositor</title>
    <meta name="description" content="Local-first generative image compositor tool" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      // Inline theme bootstrap — prevents FOUC by applying the stored class before first paint.
      (function() {
        var stored = 'dark';
        try { stored = localStorage.getItem('image-compositor-theme') || 'dark'; } catch(e) {}
        var resolved = stored;
        if (stored === 'system') {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.add(resolved);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
